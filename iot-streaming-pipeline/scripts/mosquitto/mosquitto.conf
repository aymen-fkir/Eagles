# mosquitto.conf (YOUR LAPTOP)

# 1. Networking: Ensure it listens on all interfaces (0.0.0.0)
listener 1883 0.0.0.0
allow_anonymous true 

# 2. Persistence (Keep this as you have it)
persistence true
persistence_location /mosquitto/data/

# 3. Logging (Crucial for seeing if your friend connected)
log_dest stdout
log_type all  # Set to 'all' temporarily to debug the bridge connection