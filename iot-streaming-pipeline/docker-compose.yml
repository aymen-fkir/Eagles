services:
  # 1. The MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./scripts/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./scripts/mqtt/data:/mosquitto/data
    networks:
      - iot_network
    restart: always

  # 2. Kafka 4.2.0 (KRaft Mode - No Zookeeper)
  kafka:
    image: apache/kafka:4.0.0 # Note: Ensure the tag exists, or use 'latest'
    container_name: kafka
    environment:
      # KRaft Settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      # Listeners
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      # Cluster ID is required for KRaft (Can be any UUID-style string)
      KAFKA_CLUSTER_ID: '4L6GNCw-S7u4p96pS6v6_g'
    networks:
      - iot_network
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 3. Kafka Topic Initializer
  kafka-setup:
    image: apache/kafka:4.0.0
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./scripts/kafka/init_kafka.sh:/usr/local/bin/init_kafka.sh
    entrypoint: ["/bin/bash", "/usr/local/bin/init_kafka.sh"]
    networks:
      - iot_network

  # 4. The Python Ingestor
  ingestor:
    build:
      context: ./ingestor
      dockerfile: Dockerfile
    container_name: ingestor
    depends_on:
      kafka:
        condition: service_healthy
      mosquitto:
        condition: service_started
    env_file:
      - .env
    networks:
      - iot_network

networks:
  iot_network:
    driver: bridge

volumes:
  mosquitto_data: